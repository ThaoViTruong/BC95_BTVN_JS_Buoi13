<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTVN JS Buổi 13</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-screen flex flex-col items-center p-4 font-sans gap-6">
    <!-- Bài 1: Quản lí tuyển sinh -->
    <div
      class="bg-white rounded-lg shadow-md w-full max-w-2xl overflow-hidden border-solid border-5px border-black-700"
    >
      <!-- Header -->
      <div class="bg-blue-900 p-4 border-b border-gray-200">
        <h2 class="text-xl font-bold text-white text-center">
          Quản lý tuyển sinh
        </h2>
      </div>

      <div class="p-6">
        <!-- Form -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Điểm chuẩn</label
            >
            <input
              type="number"
              id="diemChuan"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
            <p id="errorDiemChuan" class="text-red-600 text-sm mt-1 hidden"></p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Khu vực</label
            >
            <select
              id="khuVuc"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors bg-white"
            >
              <option value="X">Chọn khu vực</option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Đối tượng</label
            >
            <select
              id="doiTuong"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors bg-white"
            >
              <option value="0">Chọn đối tượng</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Điểm môn 1</label
            >
            <input
              type="number"
              id="diemMon1"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
            <p id="errorDiemMon1" class="text-red-600 text-sm mt-1 hidden"></p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Điểm môn 2</label
            >
            <input
              type="number"
              id="diemMon2"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
            <p id="errorDiemMon2" class="text-red-600 text-sm mt-1 hidden"></p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Điểm môn 3</label
            >
            <input
              type="number"
              id="diemMon3"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
            <p id="errorDiemMon3" class="text-red-600 text-sm mt-1 hidden"></p>
          </div>
        </div>

        <!-- Submit Button -->
        <div class="flex justify-center mb-6">
          <button
            onclick="tinhDiemTuyenSinh()"
            class="bg-blue-900 hover:bg-blue-700 text-white font-medium py-2 px-8 rounded-md transition-colors w-full md:w-auto"
          >
            Kết Quả
          </button>
        </div>

        <!-- Result -->
        <div
          id="resultWrapper"
          class="hidden p-4 rounded-md border text-center font-medium"
        >
          <span id="txtResult"></span>
        </div>
      </div>
    </div>

    <!-- Bài 2: Tính tiền điện -->
    <div class="bg-white rounded-lg shadow-md w-full max-w-2xl overflow-hidden">
      <!-- Header -->
      <div class="bg-gray-700 p-4 border-b border-gray-200">
        <h2 class="text-xl font-bold text-white text-center">Tính tiền điện</h2>
      </div>

      <div class="p-6">
        <!-- Form -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Nhập họ tên</label
            >
            <input
              type="text"
              id="hoTen"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
            <p id="errorHoTen2" class="text-red-600 text-sm mt-1 hidden"></p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Nhập số kw</label
            >
            <input
              type="number"
              id="soKw"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
            <p id="errorSoKw" class="text-red-600 text-sm mt-1 hidden"></p>
          </div>
        </div>

        <!-- Submit Button -->
        <div class="flex justify-center mb-6">
          <button
            onclick="tinhTienDien()"
            class="bg-gray-700 hover:bg-gray-500 text-white font-medium py-2 px-8 rounded-md transition-colors w-full md:w-auto"
          >
            Tính tiền điện
          </button>
        </div>

        <!-- Result -->
        <div
          id="resultWrapper2"
          class="hidden p-4 rounded-md border text-center font-medium"
        >
          <span id="txtResult2"></span>
        </div>
      </div>
    </div>

    <!-- Bài 3: Tính thuế thu nhập cá nhân -->
    <div
      class="bg-white rounded-lg shadow-md w-full max-w-2xl overflow-hidden mb-8"
    >
      <!-- Header -->
      <div class="bg-green-900 p-4 border-b border-gray-200">
        <h2 class="text-xl font-bold text-white text-center">
          Tính thuế thu nhập cá nhân
        </h2>
      </div>

      <div class="p-6">
        <!-- Form -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Nhập họ tên</label
            >
            <input
              type="text"
              id="hoTen3"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
            <p id="errorHoTen3" class="text-red-600 text-sm mt-1 hidden"></p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Tổng thu nhập năm</label
            >
            <input
              type="number"
              id="thuNhap"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
            <p id="errorThuNhap" class="text-red-600 text-sm mt-1 hidden"></p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Số người phụ thuộc</label
            >
            <input
              type="number"
              id="soNguoiPhuThuoc"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
            <p
              id="errorSoNguoiPhuThuoc"
              class="text-red-600 text-sm mt-1 hidden"
            ></p>
          </div>
        </div>

        <!-- Submit Button -->
        <div class="flex justify-center mb-6">
          <button
            onclick="tinhThueThuNhap()"
            class="bg-green-900 hover:bg-green-700 text-white font-medium py-2 px-8 rounded-md transition-colors w-full md:w-auto"
          >
            Tính tiền thuế
          </button>
        </div>

        <!-- Result -->
        <div
          id="resultWrapper3"
          class="hidden p-4 rounded-md border text-center font-medium"
        >
          <span id="txtResult3"></span>
        </div>
      </div>
    </div>

    <!-- Bài 4: Tính tiền cáp -->
    <div
      class="bg-white rounded-lg shadow-md w-full max-w-2xl overflow-hidden mb-8"
    >
      <!-- Header -->
      <div class="bg-amber-700 p-4 border-b border-gray-200">
        <h2 class="text-xl font-bold text-white text-center">Tính tiền cáp</h2>
      </div>
      <!-- Form -->
      <div class="p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Loại khách hàng</label
            >
            <select
              id="loaiKhachHang"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors bg-white"
            >
              <option value="">Chọn loại khách hàng</option>
              <option value="nhaDan">Nhà dân</option>
              <option value="doanhNghiep">Doanh nghiệp</option>
            </select>
            <p id="errorLoaiKhachHang" class="text-red-600 text-sm mt-1 hidden"></p>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Nhập mã khách hàng</label
            >
            <input
              type="text"
              id="maKhachHang"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
            <p id="errorMaKhachHang" class="text-red-600 text-sm mt-1 hidden"></p>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Số kênh cao cấp</label
            >
            <input
              type="number"
              id="soKenhCaoCap"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
            <p id="errorSoKenhCaoCap" class="text-red-600 text-sm mt-1 hidden"></p>
          </div>
        </div>

        <div
          id="ketNoiWrap"
          class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 hidden"
        >
          <div class="md:col-span-1">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Số kết nối</label
            >
            <input
              type="number"
              id="soKetNoi"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
            <p id="errorSoKetNoi" class="text-red-600 text-sm mt-1 hidden"></p>
          </div>
        </div>
        <!-- Submit Button -->
        <div class="flex justify-center mb-6">
          <button
            onclick="tinhTienCap()"
            class="bg-amber-700 hover:bg-amber-500 text-white font-medium py-2 px-8 rounded-md transition-colors w-full md:w-auto"
          >
            Tính tiền cáp
          </button>
        </div>
        <!-- Result -->
        <div
          id="resultWrapper4"
          class="hidden p-4 rounded-md border text-center font-medium"
        >
          <span id="txtResult4"></span>
        </div>
      </div>
    </div>

    <script src="./JS/bai1.js"></script>
    <script src="./JS/bai2.js"></script>
    <script src="./JS/bai3.js"></script>
    <script src="./JS/bai4.js"></script>
  </body>
</html>
